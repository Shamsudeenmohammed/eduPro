{% extends "students/base.html" %}
{% block title %}Password Reset Complete — eduPro{% endblock %}

{% block full_page %}
<div class="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <span class="text-5xl">🎓</span>
      <h1 class="mt-3 text-2xl font-bold text-slate-800 tracking-tight">eduPro</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
      <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
        <svg class="h-8 w-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>

      <h2 class="text-xl font-bold text-slate-800">Password updated!</h2>
      <p class="mt-2 text-sm text-slate-500">
        Your password has been reset successfully. You can now sign in with your new password.
      </p>

      <a href="{% url 'accounts:login' %}"
         class="mt-6 inline-flex w-full items-center justify-center rounded-lg bg-indigo-600 px-4 py-3
                text-sm font-semibold text-white hover:bg-indigo-700 transition-colors duration-150">
        Sign In to eduPro
      </a>
    </div>

  </div>
</div>
{% endblock %}
