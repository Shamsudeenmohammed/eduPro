{% extends "base_dashboard.html" %}
{% block content %}
<div class="card" style="margin-bottom:1rem">
  <p><strong>{{ feedback.subject }}</strong></p>
  <p>{{ feedback.message }}</p>
  <p>Sentiment: {{ feedback.sentiment }} ({{ feedback.sentiment_score }})</p>
</div>
<div class="card" style="max-width:600px">
  <form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary">Save Response</button></form>
</div>
{% endblock %}
