{% extends base_template %}{% block title %}Submit Feedback{% endblock %}
{% block content %}
<div class="page-header">
  <div class="ph-left">
    <h1>💬 Submit Feedback</h1>
    <p>Your input helps us improve</p>
  </div>
</div>
<div class="card" style="max-width:600px">
  <div class="card-header"><div class="card-title">Feedback Form</div></div>
  <form method="post" style="padding:18px;display:flex;flex-direction:column;gap:12px">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label style="display:block;font-size:10.5px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;color:var(--tx3);margin-bottom:5px">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div style="font-size:11px;color:var(--rose);margin-top:3px">{{ field.errors.0 }}</div>{% endif %}
    </div>
    {% endfor %}
    <button class="btn btn-primary" style="align-self:flex-start">Submit Feedback</button>
  </form>
</div>
<style>select,input,textarea{width:100%;background:var(--surface2);color:var(--tx1);border:1px solid var(--border2);border-radius:var(--r);padding:8px 10px;font-family:var(--font);font-size:12.5px;transition:border-color .15s}select:focus,input:focus,textarea:focus{outline:none;border-color:var(--ochre)}textarea{resize:vertical;min-height:100px}input[type=number]{width:80px}</style>
{% endblock %}
