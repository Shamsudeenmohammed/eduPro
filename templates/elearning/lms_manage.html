{% extends "base_dashboard.html" %}
{% block content %}
<div class="grid grid-2">
  <div class="card"><h3>Add Module</h3><form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary">Save</button></form>
  <h3 style="margin-top:1.5rem">Schedule Live Class</h3><form method="post">{% csrf_token %}{{ live_form.as_p }}<button name="live-submit" value="1" class="btn btn-secondary">Schedule</button></form></div>
  <div>{% for m in modules %}<div class="card" style="margin-bottom:.5rem">{{ m.title }}</div>{% endfor %}</div>
</div>
{% endblock %}
