{% extends "base_dashboard.html" %}
{% block content %}
<table class="data-table card"><thead><tr><th>Student</th><th>Subject</th><th>Status</th><th>Date</th></tr></thead>
<tbody>{% for t in page_obj %}<tr><td>{{ t.student.get_full_name }}</td><td>{{ t.subject }}</td><td>{{ t.status }}</td><td>{{ t.created_at|date }}</td></tr>{% endfor %}</tbody></table>
{% endblock %}
