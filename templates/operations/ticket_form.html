{% extends "students/base.html" %}{% block title %}New Support Ticket{% endblock %}
{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-header"><h3>Submit a Ticket</h3></div>
  <div class="card-body">
    <form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary">Submit Ticket</button></form>
  </div>
</div>
{% endblock %}
