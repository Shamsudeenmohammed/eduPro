{% extends base_template %}{% block title %}Announcements{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h3>📢 Announcements</h3></div>
  <div class="card-body">
    {% for a in announcements %}
      <div style="padding:1rem 0;{% if not forloop.last %}border-bottom:1px solid var(--border, #eee){% endif %}">
        <strong>{{ a.title }}</strong>
        <span class="badge badge-info" style="float:right">{{ a.priority }}</span>
        <p style="margin:.25rem 0 0;color:var(--text-muted, #666)">{{ a.content|truncatewords:40 }}</p>
      </div>
    {% empty %}<p class="text-muted">No announcements yet.</p>{% endfor %}
  </div>
</div>
{% endblock %}
